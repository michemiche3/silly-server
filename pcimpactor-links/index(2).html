<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PC Impactor Links — i-heart-tek</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', Courier, monospace;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 2rem;
    }
    .back {
      align-self: flex-start;
      font-size: 0.75rem;
      color: #555;
      text-decoration: none;
      margin-bottom: 2rem;
      letter-spacing: 0.06em;
    }
    .back:hover { color: #aaa; }
    h1 {
      font-size: 1.3rem;
      font-weight: normal;
      color: #fff;
      margin-bottom: 0.3rem;
    }
    .desc {
      font-size: 0.78rem;
      color: #555;
      margin-bottom: 2.5rem;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 500px;
    }
    .link-card {
      display: block;
      padding: 0.9rem 1rem;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      text-decoration: none;
      color: #ccc;
      transition: border-color 0.15s, color 0.15s;
    }
    .link-card:hover { border-color: #555; color: #fff; }
    .link-card .label {
      display: block;
      font-size: 0.68rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.25rem;
    }
    .link-card .title {
      display: block;
      font-size: 0.88rem;
      color: inherit;
      margin-bottom: 0.15rem;
    }
    .link-card .url {
      display: block;
      font-size: 0.7rem;
      color: #444;
      word-break: break-all;
    }
    .link-card:hover .url { color: #666; }
    footer {
      margin-top: 3rem;
      font-size: 0.7rem;
      color: #333;
    }
  </style>
</head>
<body>
  <a class="back" href="/">← back</a>
  <h1>PC Impactor links</h1>
  <p class="desc">sideloading tools for PC</p>
  <nav class="links">
    <a class="link-card" href="https://impactor.khcrysalis.dev/" target="_blank" rel="noopener">
      <span class="label">tool</span>
      <span class="title">Impactor — khcrysalis</span>
      <span class="url">impactor.khcrysalis.dev</span>
    </a>
  </nav>
  <footer>i-heart-tek.404.mn</footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>i-heart-tek</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', Courier, monospace;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: normal;
      color: #fff;
      margin-bottom: 0.4rem;
      letter-spacing: 0.04em;
    }
    .sub {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 2.5rem;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 400px;
    }
    .link-card {
      display: block;
      padding: 0.8rem 1rem;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      text-decoration: none;
      color: #ccc;
      font-size: 0.85rem;
      transition: border-color 0.15s, color 0.15s;
    }
    .link-card:hover { border-color: #555; color: #fff; }
    .link-card .label {
      display: block;
      color: #888;
      font-size: 0.7rem;
      margin-bottom: 0.2rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    footer {
      margin-top: 3rem;
      font-size: 0.7rem;
      color: #444;
    }
  </style>
</head>
<body>
  <h1>i-heart-tek</h1>
  <p class="sub">link index</p>
  <nav class="links">
    <a class="link-card" href="/trollguide-links/">
      <span class="label">guide</span>
      TrollStore install links
    </a>
    <a class="link-card" href="/pcimpactor-links/">
      <span class="label">tool</span>
      PC Impactor links
    </a>
  </nav>
  <footer>i-heart-tek.404.mn</footer>
</body>
</html>

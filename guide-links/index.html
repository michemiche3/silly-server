<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>guide links — i-heart-tek</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', Courier, monospace;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 2rem;
    }
    .back {
      align-self: flex-start;
      font-size: 0.75rem;
      color: #555;
      text-decoration: none;
      margin-bottom: 2rem;
      letter-spacing: 0.06em;
    }
    .back:hover { color: #aaa; }
    h1 {
      font-size: 1.3rem;
      font-weight: normal;
      color: #fff;
      margin-bottom: 0.3rem;
    }
    .desc {
      font-size: 0.78rem;
      color: #555;
      margin-bottom: 2.5rem;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 500px;
    }
    .link-card {
      display: block;
      padding: 0.8rem 1rem;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      text-decoration: none;
      color: #ccc;
      font-size: 0.85rem;
      transition: border-color 0.15s, color 0.15s;
    }
    .link-card:hover { border-color: #555; color: #fff; }
    .link-card .label {
      display: block;
      color: #888;
      font-size: 0.7rem;
      margin-bottom: 0.2rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    footer {
      margin-top: 3rem;
      font-size: 0.7rem;
      color: #444;
    }
  </style>
</head>
<body>
  <a class="back" href="/">← back</a>
  <h1>guide links</h1>
  <p class="desc">all guides and tools</p>
  <nav class="links">
    <a class="link-card" href="/guide-links/trollguide-links/">
      <span class="label">guide</span>
      TrollStore install links
    </a>
    <a class="link-card" href="/guide-links/pcimpactor-links/">
      <span class="label">tool</span>
      PC Impactor links
    </a>
  </nav>
  <footer>i-heart-tek.404.mn</footer>
  <footer><img src="https://fijiwatermiche.neocities.org/josef.png.jpg" alt="josef" width="100" height="260"></footer>
</body>
</html>
